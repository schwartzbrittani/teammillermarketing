    if(dr.e){foot.appendChild(a('email-btn',`mailto:${dr.e}`,`✉ ${dr.e}`));}
    card.appendChild(foot);g.appendChild(card);
  });
  w.appendChild(g);return w;
}

function renderRoutes(){
  const w=d('fade-in');const cs=d('cors');
  [1,2,3,4].forEach(cor=>{
    const cm=COR[cor],ch=HOMES.filter(h=>h.cor===cor);
    const card=d('cor-card');card.style.borderTop=`3px solid ${cm.c}`;
    const head=d('cor-head');
    const meta=d('cor-meta');
    const info=d('');info.appendChild(d('cor-num',`CORRIDOR ${cor}`)).style.cssText=`color:${cm.c}`;
    const cn=info.querySelector('.cor-num');if(cn)cn.style.color=cm.c;
    info.appendChild(d('cor-title',cm.l)).style.cssText=`color:${cm.c}`;
    const ctl=info.querySelector('.cor-title');if(ctl)ctl.style.color=cm.c;
    info.appendChild(d('cor-desc',cm.desc));meta.appendChild(info);
    const ct=d('cor-ct');ct.innerHTML=`<div class="big" style="color:${cm.c}">${ch.length}</div><div class="sm">locations</div>`;
    meta.appendChild(ct);head.appendChild(meta);head.appendChild(d('cor-route',`🗺 ${cm.route}`));
    card.appendChild(head);
    const stops=d('cor-stops');
    ch.forEach((h,i)=>{
      const pm=PRI[h.pri];const row=d('stop-row');
      const sn=d('stop-n',`${i+1}`);sn.style.color=cm.c;
      const si=d('stop-info');
      const nm=d('stop-name',h.short);const tb=d('tag',pm.l);tb.style.cssText=`font-size:9px;padding:1px 6px;color:${pm.c};border-color:${pm.c}44;background:${pm.c}12`;nm.appendChild(tb);
      si.appendChild(nm);si.appendChild(d('stop-addr',h.addr.split(',').slice(0,2).join(',')));
      row.append(sn,si);
      if(h.phone.startsWith('(')){const sp=a('stop-phone',`tel:${h.phone}`,h.phone);sp.onclick=ev=>ev.stopPropagation();row.appendChild(sp);}
      row.onclick=()=>{S.sel=h;S.tab='homes';updateAll();render();document.getElementById('panel-scroll').scrollTop=0;};
      stops.appendChild(row);
    });
    card.appendChild(stops);cs.appendChild(card);
  });
  const alf=d('alf-block');alf.appendChild(d('alf-lbl','ALF Connector Network'));
  alf.appendChild(d('alf-body','Phil has <strong style="color:var(--g)">31 named contacts at 33 ALF facilities</strong> in Allen County. Every ALF calls a funeral home for every resident death.'));
  alf.appendChild(d('alf-ask','"[Name], when one of your residents passes away, which funeral home do you typically call? I\'d love a brief introduction to their team — we\'re building our aftercare referral network."'));
  const ag=d('alf-grid');
  ALF.forEach(([n,p])=>{const ai=d('alf-item');ai.appendChild(d('alf-name',n));ai.appendChild(a('alf-phone',`tel:${p}`,p));ag.appendChild(ai);});
  alf.appendChild(ag);cs.appendChild(alf);w.appendChild(cs);return w;
}

function renderStrategy(){
  const w=d('guide fade-in');
  const intro=d('g-intro','<span style="font-family:Syne,sans-serif;font-size:16px;font-weight:800;color:#f59e0b;display:block;margin-bottom:8px">How to Win Fort Wayne\'s Funeral Home Market</span>Three plays cover all 16 operators. Two programs close every account. One complimentary ERP walk-through opens every door. Start there.');
  intro.style.cssText='border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.06);color:#d8c890';
  w.appendChild(intro);
  const stats=d('g-stats');
  [['16','Total Operators','#e8f0f8'],['9+','SCI Locations','#9b6ff0'],['3','Strategic Plays','#f59e0b'],['550–740','Referral Jobs / Yr','#00c45a']].forEach(([v,l,c])=>{
    const s=d('g-stat');s.innerHTML=`<div class="gv" style="color:${c}">${v}</div><div class="gl">${l}</div>`;stats.appendChild(s);
  });
  w.appendChild(stats);

  // Three plays
  const s1=d('g-sec');s1.innerHTML='<div class="g-sec-head"><div class="g-sec-num" style="color:#f59e0b">01</div><div><div class="g-sec-title">The Three Plays</div><div class="g-sec-sub">Every funeral home in Allen County falls into one of these three approaches</div></div></div>';
  const s1b=d('g-sec-body');
  const plays=[
    ['★','#9b6ff0','The SCI Portfolio Play','D.O. McComb · C.M. Sloan · Elzey-Patterson-Rodak Waynedale','D.O. McComb, C.M. Sloan, and Elzey-Patterson-Rodak are all owned by Service Corporation International (SCI) under the Dignity Memorial® brand. That\'s three business names, nine-plus locations, and <strong style="color:var(--text)">one corporate facilities decision-maker</strong>. Do not pitch these location by location. Visit the McComb Tribute Center on W Main St — the flagship — and ask the GM: "Who handles vendor and facilities agreements for all your Indiana Dignity Memorial locations?" That name is the key to the entire SCI account.',['McComb (6+ locations)','C.M. Sloan','Elzey Waynedale','ERP → CHAIN MSA']],
    ['🤝','#00c45a','The Independent Relationship Play','FairHaven · Sheets & Childs · Midwest · Ellis · Nelson · Carmichael · NI Funeral Care','Independent funeral home directors built their businesses on trust and community. They don\'t respond to procurement pitches — they respond to neighbors.<br><br><strong style="color:var(--text)">1. Get a warm intro first.</strong> Check the Door Openers tab before cold-calling any independent. Craig Traxler at Traxler-Parker knows Miles at Sheets & Childs (same small town). Ron Heilman at Summit City Insurance knows FairHaven\'s owners. A warm intro is worth ten cold calls.<br><br><strong style="color:var(--text)">2. Lead with the ERP — not the sale.</strong> "I\'d love 45 minutes to walk your facility and put together a no-cost Emergency Response Plan." That\'s the ask. The contract follows from the relationship.',['FairHaven (Britton Claghorn)','Sheets & Childs (Miles)','Midwest Funeral','East Side Bundle']],
    ['⛪','#3b8ef5','The Diocesan Umbrella Play','Divine Mercy Fort Wayne Main · Divine Mercy Cedar Canyons (Huntertown)','Divine Mercy is owned and operated by the Diocese of Fort Wayne-South Bend as a nonprofit ministry. The Diocesan Facilities Director doesn\'t just manage two funeral home buildings — they manage <strong style="color:var(--text)">dozens of parishes, schools, administrative offices, and retreat centers</strong> across northeast Indiana. A relationship here is an institutional account that can extend to every building the Diocese maintains. Connect through Sacred Heart Village in Avilla — a Catholic ALF already in Phil\'s CRM and under the same Diocese.',['Divine Mercy FW Main','Cedar Canyons Huntertown','Diocese Umbrella','Institutional MSA']],
  ];
  plays.forEach(([icon,clr,name,who,body,targets])=>{
    const pc=d('play-card');pc.style.cssText=`border-color:${clr}44;background:${clr}0e`;
    const top=d('play-card-top');
    top.innerHTML=`<div class="play-card-icon">${icon}</div><div><div class="play-card-name" style="color:${clr}">${name}</div><div class="play-card-who">${who}</div></div>`;
    pc.appendChild(top);pc.appendChild(d('play-card-body',body));
    const tr=d('play-card-targets');
    targets.forEach(t=>{const pt=d('pt',t);pt.style.cssText=`color:${clr};border-color:${clr}44;background:${clr}14`;tr.appendChild(pt);});
    pc.appendChild(tr);s1b.appendChild(pc);
  });
  s1.appendChild(s1b);w.appendChild(s1);

  // Two Programs
  const s2=d('g-sec');s2.innerHTML='<div class="g-sec-head"><div class="g-sec-num" style="color:var(--g)">02</div><div><div class="g-sec-title">Two Programs That Close Every Account</div><div class="g-sec-sub">Both are free to start. Both generate revenue.</div></div></div>';
  const s2b=d('g-sec-body');
  const p1=d('prog-card');p1.innerHTML=`<div class="prog-lbl" style="color:var(--g)">PROGRAM 1 — FACILITY SERVICES</div><div class="prog-title">Emergency Response Plan (ERP)</div><div class="prog-body">A laminated protocol document specific to their building — shut-off locations, utility contacts, SERVPRO's direct emergency line. When something goes wrong at 2am before a Monday morning service, staff pull the ERP off the wall and make one call.<br><br>Phil provides the facility walk-through, documentation, and laminated cards at <strong style="color:var(--text)">no cost and no obligation</strong>. This is the door opener. The MSA, water/fire restoration, biohazard work, and preferred vendor agreement follow from this relationship.</div><div class="prog-foot">Once ERP is on file: <span style="color:var(--g)">4-hour guaranteed response, 24/7/365</span></div>`;
  const p2=d('prog-card');p2.innerHTML=`<div class="prog-lbl" style="color:${C3}">PROGRAM 2 — AFTERCARE REFERRAL</div><div class="prog-title">The Question Every Funeral Director Gets</div><div class="prog-body"><em style="color:#e8d890">"Who can clean the house?"</em><br><br>When someone dies at home, the family stays with the contaminated property. The funeral director is the most trusted person in the room. Whoever they name gets the job.<br><br>Allen County sees ~3,700 deaths/year. Conservatively 15–20% involve a home needing professional remediation — that's <strong style="color:var(--text)">550–740 referral jobs annually</strong>. Average unattended death cleanup: $1,800–$30,000+.</div><div class="prog-foot"><span style="color:${C4}">Insurance billing when applicable — families often pay little or nothing out of pocket.</span></div>`;
  s2b.append(p1,p2);s2.appendChild(s2b);w.appendChild(s2);

  // Route Plan
  const s3=d('g-sec');s3.innerHTML=`<div class="g-sec-head"><div class="g-sec-num" style="color:${C1}">03</div><div><div class="g-sec-title">5-Day Route Plan</div><div class="g-sec-sub">All 16 operators covered across four corridors</div></div></div>`;
  const s3b=d('g-sec-body');const steps=d('steps');
  [
    ['1',C2,'SCI Sweep — Day 1','McComb Tribute Center (W Main) → McComb Lakeside (N Lake Ave) → C.M. Sloan (N Wells St). Goal: get the SCI Regional Ops Manager\'s name. One meeting unlocks 9+ locations.','Ask at every McComb stop: "Who handles facilities and vendor agreements for all your Indiana Dignity Memorial locations?"'],
    ['2',C1,'North Corridor — Day 2','FairHaven (N Clinton St) → McComb Pine Valley (E Dupont Rd) → McComb Maplewood Park (Maplecrest Rd) → Sheets & Childs Huntertown (Lima Rd). Call Craig Traxler at Traxler-Parker first.','Hi, is Miles available? Phil Lady — I got your name from Craig Traxler at Traxler-Parker…'],
    ['3',C1,'Diocese + Huntertown — Day 3','Divine Mercy Fort Wayne Main → Divine Mercy Cedar Canyons (Huntertown). One conversation with the Diocesan Facilities Director covers both sites.','Use Sacred Heart Village (in CRM) as the Diocese connection point.'],
    ['4',C3,'East Side Bundle — Day 4','Ellis Funeral Home (E Lewis St) → Nelson Memorial Gardens (Eliza St) → Community Funeral Care/Carmichael (E Jefferson Blvd). Three stops within 0.5 miles — all under 90 min.','Lead with community respect and SERVPRO\'s commitment to every Fort Wayne neighborhood.'],
    ['5',C4,'South/SW Sweep — Day 5','NI Funeral Care (Magnavox Way) → Elzey-Patterson-Rodak Waynedale (Old Trail Rd — confirm ZIP) → McComb Foster Park (Fairfield Ave) → Midwest Funeral Home (W Coliseum Blvd).','Elzey Waynedale is SCI — include in the portfolio conversation. Midwest has an on-site crematory.'],
  ].forEach(([n,c,title,body,tip])=>{
    const s=d('step');s.innerHTML=`<div class="step-num" style="color:${c}">${n}</div><div><div class="step-title">${title}</div><div class="step-body">${body}</div><div class="step-tip">${tip}</div></div>`;
    steps.appendChild(s);
  });
  s3b.appendChild(steps);s3.appendChild(s3b);w.appendChild(s3);

  return w;
}

function renderPitch(){
  const w=d('guide fade-in');
  const intro=d('g-intro','<span style="font-family:Syne,sans-serif;font-size:16px;font-weight:800;color:#9b6ff0;display:block;margin-bottom:8px">The Pitch — Leave-Behind & SOQ</span>Everything Phil needs to present SERVPRO Team Miller to a funeral home director. Use this to prepare before a visit or reference the PDF leave-behind after.');
  intro.style.cssText='border-color:rgba(155,111,240,.3);background:rgba(155,111,240,.08);color:#c0b8e0';
  w.appendChild(intro);

  // WHY
  const s1=d('g-sec');s1.innerHTML='<div class="g-sec-head"><div class="g-sec-num" style="color:var(--red)">01</div><div><div class="g-sec-title">Why SERVPRO for Funeral Homes</div><div class="g-sec-sub">The risk profile that makes this vertical unique</div></div></div>';
  const s1b=d('g-sec-body');
  const risk=d('',null);risk.style.cssText='display:flex;flex-direction:column;gap:7px';
  [['Embalming & prep rooms','Daily biohazard exposure and HVAC-intensive chemical environments','#f05050'],['100+ year old buildings','Aged plumbing, deferred maintenance — several Allen County FHs are 80–130 years old','#f05050'],['On-site crematories','FairHaven and Midwest both operate them — HVAC, biohazard, and fire exposure','#f05050'],['24/7 operations','No acceptable maintenance windows — every hour of closure costs families','#f09030'],['IICRC-Certified Biohazard Techs','Legally qualified to remediate bloodborne pathogens. No GC in Fort Wayne can do this. SERVPRO can.','#00c45a'],['24/7/365 Response','Average on-site under 4 hours. Phil\'s personal cell on every ERP card.','#00c45a'],['Insurance Carrier Relationships','Preferred vendor for Travelers, Cincinnati Financial, Nationwide, Hartford, Zurich, FM Global. SERVPRO bills direct.','#00c45a'],['National + Local','1,900+ franchise network for large-loss capacity. Phil Lady and the FW team are Fort Wayne neighbors.','#00c45a']].forEach(([b,t,c])=>{
    const r=d('svc-row');r.style.borderLeftColor=c;r.innerHTML=`<div class="svc-row-body"><div class="svc-name">${b}</div><div class="svc-desc">${t}</div></div>`;risk.appendChild(r);
  });
  s1b.appendChild(risk);s1.appendChild(s1b);w.appendChild(s1);

  // CERTS
  const s2=d('g-sec');s2.innerHTML='<div class="g-sec-head"><div class="g-sec-num" style="color:var(--g)">02</div><div><div class="g-sec-title">Active Certifications</div><div class="g-sec-sub">SERVPRO Team Miller holds all of these</div></div></div>';
  const s2b=d('g-sec-body');
  const cg=d('cert-grid');
  [['IICRC WRT','Water Restoration Technician'],['IICRC FSRT','Fire & Smoke Restoration'],['IICRC AMRT','Applied Microbial Remediation'],['IICRC RBBT','Biohazard & Bloodborne Pathogen'],['OSHA 10/30','General Industry Safety'],['IICRC OCT','Odor Control Technician']].forEach(([n,desc])=>{
    const c=d('cert-cell');c.innerHTML=`<div class="cert-name">${n}</div><div class="cert-desc">${desc}</div>`;cg.appendChild(c);
  });
  s2b.appendChild(cg);
  const legal=d('insight','<strong style="color:#f05050">Biohazard Legal Authority:</strong> SERVPRO Team Miller\'s technicians hold IICRC RBBT certification and operate in compliance with OSHA 29 CFR 1910.1030. This is the legally required credential for remediating bloodborne pathogens. No general contractor or janitorial company holds this certification. This is a legal requirement — and we meet it.');
  legal.style.cssText='border-color:rgba(240,80,80,.3);background:rgba(240,80,80,.06);color:var(--muted);margin-top:0';
  s2b.appendChild(legal);s2.appendChild(s2b);w.appendChild(s2);

  // PRICING
  const s3=d('g-sec');s3.innerHTML=`<div class="g-sec-head"><div class="g-sec-num" style="color:${C3}">03</div><div><div class="g-sec-title">Pricing Context</div><div class="g-sec-sub">All work is scoped on-site — ranges for planning and conversation only</div></div></div>`;
  const s3b=d('g-sec-body');
  [['Facility Services',[
    ['Emergency Water Restoration','$1,500–$8,000','Per room, depends on sq ft',false],
    ['Structural Drying — full facility','$8,000–$22,000','To IICRC drying standard',false],
    ['Mold Remediation','$2,500–$15,000','Includes containment and clearance testing',false],
    ['Fire / Smoke Restoration','$5,000–$80,000','Full facility events at high end',false],
    ['Biohazard — Preparation Suite','$2,000–$8,000','IICRC RBBT protocol, documentation included',true],
    ['Odor Elimination (standalone)','$800–$3,500','Thermal fog, hydroxyl, or ozone',false],
    ['Emergency Response Plan (ERP)','COMPLIMENTARY','No cost. No obligation. Always.',true],
  ]],['Aftercare Referral Services — Family Jobs',[
    ['Natural Death — minor cleanup','$800–$2,500','Discovered same day',false],
    ['Natural Death — extended (2–5 days)','$2,500–$7,000','Soiling to flooring and soft goods',false],
    ['Unattended Death — 1–2 weeks','$5,000–$15,000','Full biohazard protocol',true],
    ['Unattended Death — decomposition','$10,000–$30,000','Subfloor, drywall extraction likely',true],
    ['Trauma / Crime Scene Cleanup','$3,000–$20,000','Blood cleanup, decontamination',false],
    ['Hoarding + Death (combined scope)','$15,000–$60,000','Most complex residential job type',true],
    ['Estate Deep Cleaning (pre-listing)','$1,200–$4,500','Odor, deep clean, prep for sale',false],
  ]]].forEach(([title,rows])=>{
    s3b.appendChild(d('',`<div style="font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px">${title}</div>`));
    const pb=d('pricing-block');pb.appendChild(d('pricing-hdr','Service · Range · Notes'));
    rows.forEach(([svc,range,note,hi])=>{
      const r=d('pricing-row'+(hi?' hi':''));r.innerHTML=`<div class="pr-name">${svc}</div><div class="pr-vals"><span class="pr-val">${range}</span><span class="pr-note">${note}</span></div>`;pb.appendChild(r);
    });
    s3b.appendChild(pb);
  });
  s3.appendChild(s3b);w.appendChild(s3);

  // OFFER
  const s4=d('g-sec');s4.innerHTML='<div class="g-sec-head"><div class="g-sec-num" style="color:var(--g)">04</div><div><div class="g-sec-title">The Offer</div><div class="g-sec-sub">Two programs. No cost to start. No contract required.</div></div></div>';
  const s4b=d('g-sec-body');const oc=d('offer-cards');
  [['01','Complimentary ERP Walk-Through','Phil Lady schedules a 45–60 minute facility walk-through, documents every utility shut-off and risk exposure, produces a laminated ERP protocol for the wall and a digital copy on file with SERVPRO dispatch. No cost. No contract. Always.',G],
   ['02','Preferred Vendor Agreement','Simple written agreement on the approved vendor list, priority response guarantee, and documented certificate of insurance for SCI/Dignity Memorial corporate vendor qualification. No retainer, no minimum spend.',C1],
   ['03','Aftercare Referral Partner Enrollment','Printed SERVPRO Aftercare cards for the intake packet, a dedicated after-hours line for staff to reach Phil directly, and SERVPRO\'s commitment to represent the funeral home well with every referred family. No fees. No contract.',C3],
   ['04','First-Call Guarantee','For facilities with an active ERP on file: response team on-site within 4 hours of the call, 24/7/365. Phil Lady\'s personal cell on every ERP card.',C2],
  ].forEach(([num,title,body,c])=>{
    const card=d('offer-card');card.style.borderBottomColor=c;
    card.innerHTML=`<div class="offer-num" style="color:${c}">${num}</div><div class="offer-title">${title}</div><div class="offer-body">${body}</div>`;oc.appendChild(card);
  });
  s4b.appendChild(oc);s4.appendChild(s4b);w.appendChild(s4);

  // OPENERS
  const s5=d('g-sec');s5.innerHTML='<div class="g-sec-head"><div class="g-sec-num" style="color:var(--purp)">05</div><div><div class="g-sec-title">Opener Scripts by Account Type</div><div class="g-sec-sub">Use verbatim or adapt — the logic in each is intentional</div></div></div>';
  const s5b=d('g-sec-body');
  [
    ['SCI / Dignity Memorial Locations (McComb, Sloan, Elzey)','Phil Lady, SERVPRO Team Miller. We service commercial facilities across Fort Wayne — we specifically wanted to reach out to Dignity Memorial because you operate multiple locations in our territory. Can you connect me with whoever handles facilities and vendor relationships at the regional level?'],
    ['Independent Owners (FairHaven, Midwest, Community Homes)','Phil Lady, SERVPRO Team Miller — Fort Wayne neighbors. We work specifically with funeral homes because of the zero-tolerance environment you operate in. An event here isn\'t just a building problem — it\'s a family problem. I\'d love 15 minutes to walk the facility and put together a no-cost Emergency Response Plan. Can we schedule that?'],
    ['Sheets & Childs — ask for Miles by name','Hi, is Miles available? Phil Lady with SERVPRO Team Miller — I got your name from Craig Traxler at Traxler-Parker. We work with funeral homes along the Lima Road corridor. Can I stop by and walk the Huntertown facility? 15 minutes, no pitch.'],
    ['Divine Mercy / Diocesan Contacts','Phil Lady, SERVPRO Team Miller. We serve the Diocese of Fort Wayne-South Bend on the restoration side and wanted to make sure Divine Mercy\'s facilities team knows us by name before an event happens. I\'d love to walk both your Fort Wayne and Cedar Canyons locations. Would the Diocesan Facilities Director be the right contact for that?'],
  ].forEach(([who,txt])=>{
    const oc2=d('opener-card');oc2.innerHTML=`<div class="opener-lbl">OPENER SCRIPT</div><div class="opener-who">${who}</div><div class="opener-txt">"${txt}"</div>`;s5b.appendChild(oc2);
  });
  s5.appendChild(s5b);w.appendChild(s5);
  return w;
}

function render(){
  const panel=document.getElementById('panel');panel.innerHTML='';
  const searchBar=document.getElementById('mob-search-bar');
  const filters=document.getElementById('mob-filters');
  const isHomes=S.tab==='homes';
  if(searchBar)searchBar.style.display=isHomes&&!S.sel?'flex':'none';
  if(filters)filters.style.display=isHomes&&!S.sel?'flex':'none';
  let view;
  if(S.tab==='strategy')view=renderStrategy();
  else if(S.tab==='pitch')view=renderPitch();
  else if(S.tab==='homes')view=S.sel?renderDetail(S.sel):renderHomes();
  else if(S.tab==='doors')view=renderDoors();
  else view=renderRoutes();
  panel.appendChild(view);
}

function updateAll(){
  // bottom nav
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===S.tab));
  // desktop sidebar tabs
  document.querySelectorAll('.sb-btn[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===S.tab));
  // priority filters
  document.querySelectorAll('.filt-pri').forEach(b=>{
    const on=b.dataset.pri===S.pri;b.classList.toggle('active',on);
    const pm=PRI[b.dataset.pri];
    b.style.cssText=on&&pm?`background:${pm.c}22;color:${pm.c};border-color:${pm.c}55`:'';
  });
  document.querySelectorAll('.filt-cor').forEach(b=>{
    const ci=parseInt(b.dataset.cor),on=ci===S.cor;b.classList.toggle('active',on);
    const c=ci?COR[ci].c:G;
    b.style.cssText=on?`background:${c}22;color:${c};border-color:${c}55`:'';
  });
  // mobile chips
  document.querySelectorAll('.chip[data-pri]').forEach(b=>{
    const pm=PRI[b.dataset.pri];const on=b.dataset.pri===S.pri;
    b.classList.toggle('on',on);
    if(on&&pm)b.style.cssText=`background:${pm.c};color:#fff;border-color:transparent`;
    else if(on)b.style.cssText=`background:${G};color:#fff;border-color:transparent`;
    else b.style.cssText='';
  });
  document.querySelectorAll('.chip[data-cor]').forEach(b=>{
    const ci=parseInt(b.dataset.cor),on=ci===S.cor;
    b.classList.toggle('on',on);
    const c=ci?COR[ci].c:G;
    b.style.cssText=on?`background:${c};color:#fff;border-color:transparent`:'';
  });
}

// Bottom nav
document.querySelectorAll('.nav-btn[data-tab]').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;S.sel=null;updateAll();render();document.getElementById('panel-scroll').scrollTop=0;});
// Desktop sidebar tabs
document.querySelectorAll('.sb-btn[data-tab]').forEach(b=>b.onclick=()=>{S.tab=b.dataset.tab;S.sel=null;updateAll();render();document.getElementById('panel-scroll').scrollTop=0;});
// Desktop priority/corridor filters
document.querySelectorAll('.filt-pri').forEach(b=>b.onclick=()=>{S.pri=b.dataset.pri;if(S.sel)S.sel=null;updateAll();render();});
document.querySelectorAll('.filt-cor').forEach(b=>b.onclick=()=>{S.cor=parseInt(b.dataset.cor);if(S.sel)S.sel=null;updateAll();render();});
// Desktop search
const sbSearch=document.getElementById('sb-search');if(sbSearch)sbSearch.oninput=ev=>{S.q=ev.target.value;if(S.sel)S.sel=null;render();};
// Mobile search
const mobSearch=document.getElementById('mob-search');if(mobSearch)mobSearch.oninput=ev=>{S.q=ev.target.value;if(S.sel)S.sel=null;render();};
// Mobile priority chips
document.querySelectorAll('.chip[data-pri]').forEach(b=>b.onclick=()=>{S.pri=b.dataset.pri;if(S.sel)S.sel=null;updateAll();render();});
document.querySelectorAll('.chip[data-cor]').forEach(b=>b.onclick=()=>{S.cor=parseInt(b.dataset.cor);if(S.sel)S.sel=null;updateAll();render();});

updateAll();render();
</script>
</body>
</html>
