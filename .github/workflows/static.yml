<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FTW Funeral Playbook — Phil Lady</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:     #080e16;
  --bg2:    #0d1520;
  --bg3:    #111d2c;
  --bg4:    #16253a;
  --line:   rgba(255,255,255,.07);
  --line2:  rgba(255,255,255,.13);
  --text:   #e8f0f8;
  --muted:  #5a7a9a;
  --dim:    #2a4060;
  --g:      #00c45a;
  --gd:     rgba(0,196,90,.12);
  --gb:     rgba(0,196,90,.28);
  --c1:     #3b8ef5;
  --c2:     #9b6ff0;
  --c3:     #f0a030;
  --c4:     #22c78a;
  --red:    #f05050;
  --amb:    #f09030;
  --purp:   #9b6ff0;
  --hot:    #f09030;
  --r:      10px;
  --rs:     7px;
  --nav-h:  62px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; -webkit-text-size-adjust: 100%; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  line-height: 1.5;
  height: 100%;
  overflow: hidden;
}

/* ── LAYOUT ──────────────────────────────────────────────── */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* TOP BAR */
.topbar {
  background: var(--bg2);
  border-bottom: 1px solid var(--line);
  padding: 0 16px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 10px;
}
.logo {
  display: flex;
  align-items: center;
  gap: 8px;
}
.pip {
  width: 3px;
  height: 26px;
  background: var(--g);
  border-radius: 2px;
  flex-shrink: 0;
}
.logo-words .l1 { font-size: 9px; color: var(--muted); letter-spacing: .15em; }
.logo-words .l2 { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); line-height: 1; }
.top-pills { display: flex; gap: 6px; }
.tp {
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 3px 10px;
  display: flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.tp .v { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 13px; }
.tp .l { font-size: 9px; color: var(--muted); letter-spacing: .08em; }

/* SCROLL AREA */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}

/* BOTTOM NAV */
.bottom-nav {
  background: var(--bg2);
  border-top: 1px solid var(--line);
  height: var(--nav-h);
  display: flex;
  align-items: stretch;
  flex-shrink: 0;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  transition: color .15s;
  padding: 8px 2px;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}
.nav-btn .icon { font-size: 18px; line-height: 1; }
.nav-btn .label { font-size: 9px; letter-spacing: .05em; }
.nav-btn.active { color: var(--g); }
.nav-btn.active::after {
  content: '';
  position: absolute;
  top: 0; left: 20%; right: 20%;
  height: 2px;
  background: var(--g);
  border-radius: 0 0 2px 2px;
}

/* ── SEARCH BAR ───────────────────────────────────────────── */
.search-bar {
  padding: 10px 14px 6px;
  display: flex;
  gap: 8px;
  align-items: center;
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 10;
  border-bottom: 1px solid var(--line);
}
.search-inp {
  flex: 1;
  background: var(--bg3);
  border: 1px solid var(--line);
  border-radius: var(--rs);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  min-width: 0;
  -webkit-appearance: none;
}
.search-inp:focus { border-color: var(--gb); }
.search-inp::placeholder { color: var(--muted); }

/* Filter chips */
.filters {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 8px 14px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.filters::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  font-size: 10px;
  padding: 5px 11px;
  border-radius: 20px;
  cursor: pointer;
  border: 1px solid var(--line);
  background: transparent;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
  transition: all .12s;
}
.chip.on { color: #fff; border-color: transparent; }

/* ── CARDS ────────────────────────────────────────────────── */
.cards { display: flex; flex-direction: column; gap: 8px; padding: 10px 14px 14px; }

.card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  overflow: hidden;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background .15s;
  position: relative;
}
.card:active { background: var(--bg3); }

.card-stripe { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.card-body { padding: 13px 14px 12px 18px; }

.card-tags { display: flex; gap: 5px; margin-bottom: 7px; flex-wrap: wrap; }
.tag {
  font-size: 9px;
  padding: 2px 8px;
  border-radius: 10px;
  letter-spacing: .08em;
  text-transform: uppercase;
  font-weight: 500;
  border: 1px solid;
}
.card-name {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 3px;
  line-height: 1.3;
}
.card-addr { font-size: 11px; color: var(--muted); margin-bottom: 9px; }

.plays { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px; }
.play {
  font-size: 9px;
  padding: 3px 8px;
  border-radius: 8px;
  border: 1px solid;
  letter-spacing: .04em;
}
.card-foot { display: flex; align-items: center; gap: 10px; }
.cphone { font-size: 12px; font-weight: 500; color: var(--g); text-decoration: none; }
.cdm { font-size: 11px; color: var(--muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.door-snip {
  margin-top: 9px;
  font-size: 10px;
  color: var(--g);
  padding: 5px 10px;
  background: var(--gd);
  border-radius: 6px;
  border-left: 2px solid var(--g);
  line-height: 1.4;
}

/* ── DETAIL ───────────────────────────────────────────────── */
.detail { padding: 14px; display: flex; flex-direction: column; gap: 10px; }
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 9px 14px;
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--rs);
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  align-self: flex-start;
}

.det-hdr {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 16px;
}
.det-name {
  font-family: 'Syne', sans-serif;
  font-size: 20px;
  font-weight: 800;
  color: var(--text);
  margin: 8px 0 4px;
  line-height: 1.25;
}
.det-addr { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
.det-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
.det-field { background: var(--bg3); border-radius: var(--rs); padding: 9px 12px; }
.det-lbl { font-size: 9px; color: var(--muted); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 3px; }
.det-val { font-size: 12px; color: var(--text); font-weight: 500; word-break: break-word; }
.det-note {
  background: var(--bg3);
  border-left: 2px solid var(--c1);
  border-radius: 0 var(--rs) var(--rs) 0;
  padding: 9px 12px;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.7;
  margin-top: 10px;
}

.sec {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  overflow: hidden;
}
.sec-lbl {
  font-size: 9px;
  letter-spacing: .14em;
  text-transform: uppercase;
  font-weight: 500;
  padding: 12px 15px 8px;
}
.sec-body { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 6px; }

.dm-row {
  background: var(--bg3);
  border-radius: var(--rs);
  padding: 11px 13px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.dm-info { flex: 1; min-width: 0; }
.dm-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); }
.dm-title { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.call-btn {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 8px 13px;
  background: var(--gd);
  border: 1px solid var(--gb);
  border-radius: var(--rs);
  color: var(--g);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  text-decoration: none;
  white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}

.door-row {
  background: var(--bg3);
  border-radius: var(--rs);
  padding: 11px 13px;
  border-left: 2px solid var(--g);
}
.door-row.hot { border-left-color: var(--hot); }
.door-info { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
.door-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 7px;
  flex-wrap: wrap;
}
.hot-tag {
  font-size: 9px;
  padding: 1px 6px;
  background: rgba(240,144,48,.15);
  color: var(--hot);
  border: 1px solid rgba(240,144,48,.3);
  border-radius: 8px;
}
.door-co { font-size: 11px; color: var(--muted); margin-top: 1px; }
.door-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.email-btn {
  display: inline-flex;
  padding: 7px 12px;
  background: rgba(59,142,245,.1);
  border: 1px solid rgba(59,142,245,.25);
  border-radius: var(--rs);
  color: var(--c1);
  font-size: 11px;
  text-decoration: none;
  white-space: nowrap;
}

.opener-block {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-left: 3px solid var(--purp);
  border-radius: 0 var(--r) var(--r) 0;
  padding: 14px 15px;
}
.opener-lbl { font-size: 9px; color: var(--purp); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 8px; }
.opener-text { font-size: 12px; color: var(--muted); line-height: 1.8; font-style: italic; }

/* ── DOORS TAB ──────────────────────────────────────────────── */
.doors-list { display: flex; flex-direction: column; gap: 8px; padding: 12px 14px; }
.door-card {
  background: var(--bg2);
  border: 1px solid var(--line);
  border-radius: var(--r);
  padding: 13px 15px;
}
.door-card-cat { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; font-weight: 500; margin-bottom: 4px; }
.door-card-name { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.door-card-co { font-size: 11px; color: var(--muted); margin-bottom: 8px; }
.door-card-why { font-size: 11px; color: var(--muted); line-height: 1.7; font-style: italic; margin-bottom: 10px; }
.door-card-foot { display: flex; gap: 7px; flex-wrap: wrap; }

/* ── CORRIDORS TAB ────────────────────────────────────────────── */
.cors { display: flex; flex-direction: column; gap: 10px; padding: 12px 14px; }
.cor-card { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; }
.cor-head { padding: 14px 16px 12px; }
.cor-meta { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.cor-num { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; font-weight: 500; margin-bottom: 2px; }
.cor-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; }
.cor-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
.cor-ct { text-align: right; }
.cor-ct .big { font-family: 'Syne', sans-serif; font-size: 30px; font-weight: 800; line-height: 1; }
.cor-ct .sm { font-size: 9px; color: var(--muted); letter-spacing: .08em; }
.cor-route {
  background: var(--bg3);
  border-radius: var(--rs);
  padding: 8px 12px;
  font-size: 11px;
  color: var(--muted);
  line-height: 1.6;
}
.cor-stops { padding: 8px 12px 12px; border-top: 1px solid var(--line); display: flex; flex-direction: column; gap: 5px; }
.stop-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--bg3);
  border-radius: var(--rs);
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.stop-row:active { background: var(--bg4); }
.stop-n { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; min-width: 22px; }
.stop-info { flex: 1; min-width: 0; }
.stop-name { font-size: 12px; font-weight: 500; color: var(--text); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.stop-addr { font-size: 10px; color: var(--muted); margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.stop-phone {
  font-size: 11px;
  color: var(--g);
  text-decoration: none;
  background: var(--gd);
  border: 1px solid var(--gb);
  border-radius: var(--rs);
  padding: 6px 10px;
  white-space: nowrap;
  flex-shrink: 0;
}
.alf-block {
  background: rgba(0,196,90,.05);
  border: 1px solid var(--gb);
  border-radius: var(--r);
  padding: 15px;
}
.alf-lbl { font-size: 9px; color: var(--g); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 8px; }
.alf-body { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 10px; }
.alf-ask { background: var(--bg3); border-radius: var(--rs); padding: 10px 13px; font-size: 11px; color: var(--muted); font-style: italic; line-height: 1.75; margin-bottom: 12px; }
.alf-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
.alf-item { background: var(--bg3); border-radius: var(--rs); padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; gap: 6px; flex-wrap: wrap; }
.alf-name { font-size: 11px; color: var(--muted); }
.alf-phone { font-size: 11px; color: var(--g); text-decoration: none; font-weight: 500; }

/* ── GUIDE TABS ────────────────────────────────────────────── */
.guide { padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; }

.g-intro {
  border-radius: var(--r);
  padding: 15px 16px;
  font-size: 12px;
  line-height: 1.8;
  border: 1px solid;
}

.g-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.g-stat { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--r); padding: 13px 14px; }
.g-stat .gv { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; line-height: 1; margin-bottom: 4px; }
.g-stat .gl { font-size: 9px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; }

.g-sec { background: var(--bg2); border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; }
.g-sec-head { padding: 14px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: flex-start; gap: 12px; }
.g-sec-num { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; line-height: 1; min-width: 28px; flex-shrink: 0; }
.g-sec-title { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 700; color: var(--text); }
.g-sec-sub { font-size: 11px; color: var(--muted); margin-top: 2px; line-height: 1.4; }
.g-sec-body { padding: 13px 14px; display: flex; flex-direction: column; gap: 10px; }

.play-card { border-radius: var(--rs); padding: 13px 14px; border: 1px solid; }
.play-card-top { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 8px; }
.play-card-icon { font-size: 20px; width: 30px; text-align: center; flex-shrink: 0; line-height: 1.2; }
.play-card-name { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; line-height: 1.2; }
.play-card-who { font-size: 10px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
.play-card-body { font-size: 11px; color: var(--muted); line-height: 1.8; margin-bottom: 10px; }
.play-card-targets { display: flex; gap: 5px; flex-wrap: wrap; }
.pt { font-size: 9px; padding: 3px 8px; border-radius: 8px; border: 1px solid; letter-spacing: .04em; }

.steps { display: flex; flex-direction: column; gap: 7px; }
.step { display: flex; gap: 12px; background: var(--bg3); border-radius: var(--rs); padding: 12px 13px; }
.step-num { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 800; min-width: 22px; line-height: 1.2; flex-shrink: 0; }
.step-title { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 4px; line-height: 1.4; }
.step-body { font-size: 11px; color: var(--muted); line-height: 1.75; }
.step-tip { display: inline-block; margin-top: 8px; font-size: 10px; padding: 4px 10px; background: var(--gd); border: 1px solid var(--gb); border-radius: 8px; color: var(--g); font-style: italic; line-height: 1.5; }

.insight { border-radius: var(--rs); padding: 12px 14px; font-size: 11px; line-height: 1.8; border: 1px solid; }

.cert-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.cert-cell { background: var(--bg3); border-radius: var(--rs); padding: 10px 8px; text-align: center; }
.cert-name { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--g); }
.cert-desc { font-size: 9px; color: var(--muted); margin-top: 3px; line-height: 1.4; }

.svc-row { display: flex; gap: 0; background: var(--bg3); border-radius: var(--rs); padding: 12px 14px; border-left: 3px solid; }
.svc-row-body { flex: 1; }
.svc-name { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 3px; }
.svc-desc { font-size: 11px; color: var(--muted); line-height: 1.7; }

.pricing-block { overflow: hidden; border-radius: var(--rs); border: 1px solid var(--line); }
.pricing-hdr { background: var(--bg4); font-size: 9px; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; padding: 7px 12px; }
.pricing-row { padding: 9px 12px; border-top: 1px solid var(--line); font-size: 11px; }
.pricing-row.hi { background: rgba(0,196,90,.05); }
.pr-name { color: var(--text); font-weight: 500; margin-bottom: 2px; }
.pr-vals { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.pr-val { color: var(--g); font-weight: 500; font-family: 'Syne', sans-serif; font-size: 12px; }
.pr-note { color: var(--muted); font-size: 10px; }

.offer-cards { display: flex; flex-direction: column; gap: 8px; }
.offer-card { background: var(--bg3); border-radius: var(--rs); padding: 13px 14px; border: 1px solid var(--line); border-bottom: 2px solid; }
.offer-num { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 6px; }
.offer-title { font-size: 13px; font-weight: 500; color: var(--text); margin-bottom: 5px; }
.offer-body { font-size: 11px; color: var(--muted); line-height: 1.75; }

.opener-card { background: var(--bg3); border-radius: var(--rs); padding: 12px 14px; border-left: 3px solid var(--purp); }
.opener-who { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.opener-lbl { font-size: 9px; color: var(--purp); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 5px; }
.opener-txt { font-size: 11px; color: var(--muted); line-height: 1.8; font-style: italic; }

/* prog cards */
.prog-card { background: var(--bg3); border-radius: var(--rs); padding: 13px 14px; border: 1px solid var(--line); }
.prog-lbl { font-size: 9px; letter-spacing: .12em; text-transform: uppercase; font-weight: 500; margin-bottom: 8px; }
.prog-title { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.prog-body { font-size: 11px; color: var(--muted); line-height: 1.8; margin-bottom: 8px; }
.prog-foot { font-size: 10px; color: var(--muted); }

.empty { padding: 60px 20px; text-align: center; color: var(--muted); }

/* Scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--dim); border-radius: 2px; }

.fade-in { animation: fi .15s ease; }
@keyframes fi { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* DESKTOP — show filters in sidebar style */
@media (min-width: 760px) {
  .app { flex-direction: column; }
  .bottom-nav { display: none; }
  .topbar { height: 54px; }
  .top-pills .tp:last-child { display: flex; }

  .app-inner { display: grid; grid-template-columns: 200px 1fr; flex: 1; overflow: hidden; }
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overflow-x: hidden;
    flex-shrink: 0;
  }
  .sb-section { padding: 14px 10px 8px; }
  .sb-label { font-size: 9px; color: var(--muted); letter-spacing: .14em; text-transform: uppercase; margin-bottom: 6px; padding: 0 4px; }
  .sb-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 8px 10px;
    border-radius: var(--rs);
    cursor: pointer;
    margin-bottom: 2px;
    font-size: 12px;
    color: var(--muted);
    background: transparent;
    border: none;
    width: 100%;
    text-align: left;
    font-family: 'DM Mono', monospace;
    transition: all .13s;
    -webkit-tap-highlight-color: transparent;
  }
  .sb-btn:hover { background: var(--bg3); color: var(--text); }
  .sb-btn.active { background: var(--bg4); color: var(--text); }
  .sb-btn.active .sb-dot { background: var(--g); }
  .sb-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); flex-shrink: 0; }
  .sb-badge { margin-left: auto; font-size: 10px; padding: 1px 6px; border-radius: 10px; }
  .sb-div { height: 1px; background: var(--line); margin: 8px 10px; }
  .sb-search { padding: 10px 10px 4px; }
  .sb-search-inp {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--line);
    border-radius: var(--rs);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
  }
  .sb-search-inp:focus { border-color: var(--gb); }
  .sb-footer { margin-top: auto; padding: 12px; border-top: 1px solid var(--line); font-size: 10px; color: var(--muted); line-height: 1.6; }

  /* hide mobile-only elements on desktop */
  .search-bar, .filters, .mobile-only { display: none; }

  .panel-scroll { overflow-y: auto; overflow-x: hidden; flex: 1; }
  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); }
}
@media (max-width: 759px) {
  .app-inner { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .sidebar { display: none; }
  .panel-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
  .tp.hide-mob { display: none; }
}
</style>
</head>
