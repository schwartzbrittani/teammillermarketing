let S={tab:'homes',sel:null,cor:0,pri:'ALL',q:''};

function e(tag,cls,html){const el=document.createElement(tag);if(cls)el.className=cls;if(html!==undefined)el.innerHTML=html;return el;}
function d(cls,html){return e('div',cls,html);}
function a(cls,href,txt){const el=e('a',cls,txt);el.href=href;return el;}

function filt(){return HOMES.filter(h=>{
  if(S.cor&&h.cor!==S.cor)return false;
  if(S.pri!=='ALL'&&h.pri!==S.pri)return false;
  if(S.q){const q=S.q.toLowerCase();return h.name.toLowerCase().includes(q)||h.addr.toLowerCase().includes(q)||h.plays.some(p=>p.toLowerCase().includes(q));}
  return true;
});}

function renderHomes(){
  const fl=filt();
  const ct=document.getElementById('sb-homes-ct');if(ct)ct.textContent=fl.length;
  const w=d('fade-in');
  const g=d('cards');
  if(!fl.length){g.appendChild(d('empty','No results matching your filters.'));w.appendChild(g);return w;}
  fl.forEach(h=>{
    const cm=COR[h.cor],pm=PRI[h.pri],hd=h.doors.find(dr=>dr.hot);
    const card=d('card');
    const stripe=d('card-stripe');stripe.style.background=cm.c;card.appendChild(stripe);
    const body=d('card-body');
    const tags=d('card-tags');
    const t1=d('tag',`C${h.cor}`);t1.style.cssText=`color:${cm.c};border-color:${cm.c}44;background:${cm.c}14`;
    const t2=d('tag',pm.l);t2.style.cssText=`color:${pm.c};border-color:${pm.c}44;background:${pm.c}14`;
    tags.append(t1,t2);body.appendChild(tags);
    body.appendChild(d('card-name',h.name));
    body.appendChild(d('card-addr',h.addr));
    const plays=d('plays');
    h.plays.slice(0,3).forEach(p=>{const pc=d('play',p);pc.style.cssText=`color:${cm.c};border-color:${cm.c}40;background:${cm.c}10`;plays.appendChild(pc);});
    body.appendChild(plays);
    const foot=d('card-foot');
    if(h.phone.startsWith('(')){const pa=a('cphone',`tel:${h.phone}`,h.phone);pa.onclick=ev=>ev.stopPropagation();foot.appendChild(pa);}
    foot.appendChild(d('cdm',h.dms[0].n));
    body.appendChild(foot);
    if(hd)body.appendChild(d('door-snip',`🔑 ${hd.n} — ${hd.co}`));
    card.appendChild(body);
    card.onclick=()=>{S.sel=h;render();document.getElementById('panel-scroll').scrollTop=0;};
    g.appendChild(card);
  });
  w.appendChild(g);return w;
}

function renderDetail(h){
  const cm=COR[h.cor],pm=PRI[h.pri];
  const w=d('detail fade-in');
  const back=e('button','back-btn','← Back');back.onclick=()=>{S.sel=null;render();document.getElementById('panel-scroll').scrollTop=0;};
  w.appendChild(back);
  // Header
  const hdr=d('det-hdr');hdr.style.borderLeft=`3px solid ${cm.c}`;
  const tags=d('card-tags');
  const t1=d('tag',`C${h.cor} — ${cm.l}`);t1.style.cssText=`color:${cm.c};border-color:${cm.c}44;background:${cm.c}14`;
  const t2=d('tag',pm.l+' Priority');t2.style.cssText=`color:${pm.c};border-color:${pm.c}44;background:${pm.c}14`;
  tags.append(t1,t2);hdr.appendChild(tags);
  hdr.appendChild(d('det-name',h.name));hdr.appendChild(d('det-addr',h.addr));
