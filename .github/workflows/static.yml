    info.appendChild(d('dm-name',dm.n));info.appendChild(d('dm-title',dm.t));row.appendChild(info);
    if(dm.p.startsWith('(')){const cb=a('call-btn',`tel:${dm.p}`,`📞 ${dm.p}`);row.appendChild(cb);}
    db.appendChild(row);
  });
  dms.appendChild(db);w.appendChild(dms);
  // Doors
  const ds=d('sec');ds.style.cssText='background:rgba(0,196,90,0.04);border-color:rgba(0,196,90,0.2)';
  ds.appendChild(d('sec-lbl',`<span style="color:${G}">🔑 CRM DOOR OPENERS — Phil already knows these people</span>`));
  const dob=d('sec-body');
  h.doors.forEach(dr=>{
    const row=d('door-row'+(dr.hot?' hot':''));
    const di=d('door-info');
    const nl=d('');const nm=d('door-name',dr.n);if(dr.hot){nm.appendChild(d('hot-tag','🔥 HOT'));}nl.appendChild(nm);nl.appendChild(d('door-co',dr.co));di.appendChild(nl);
    const acts=d('door-actions');
    if(dr.p.startsWith('(')){acts.appendChild(a('call-btn',`tel:${dr.p}`,`📞 ${dr.p}`));}
    if(dr.e){acts.appendChild(a('email-btn',`mailto:${dr.e}`,`✉ Email`));}
    di.appendChild(acts);row.appendChild(di);dob.appendChild(row);
  });
  ds.appendChild(dob);w.appendChild(ds);
  // Opener
  const ob=d('opener-block');ob.appendChild(d('opener-lbl','📞 SUGGESTED OPENER'));ob.appendChild(d('opener-text',`"${h.opener}"`));w.appendChild(ob);
  return w;
}

function renderDoors(){
  const w=d('fade-in');const g=d('doors-list');
